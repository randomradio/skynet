name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Web lint
        run: pnpm --filter @skynet/web lint

      - name: Typecheck
        run: pnpm -r --filter "@skynet/*" run --if-present typecheck

      - name: Test
        run: pnpm -r --filter "@skynet/*" run --if-present test
