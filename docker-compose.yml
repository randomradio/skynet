services:
  matrixone:
    image: matrixorigin/matrixone:2.0.1
    container_name: skynet-matrixone
    ports:
      - "6001:6001"
    environment:
      MYSQL_ROOT_PASSWORD: "111"
    volumes:
      - mo_data:/mo-data
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/6001'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  sandbox:
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
    image: skynet-sandbox:latest
    container_name: skynet-sandbox
    security_opt:
      - seccomp:unconfined
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    shm_size: "2gb"
    ports:
      - "${SANDBOX_PORT:-8180}:8080"
    environment:
      WORKSPACE: "/home/gem"
      TZ: "Asia/Shanghai"
    volumes:
      - ./.skill-hub:/skills:ro

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    image: skynet-web:latest
    container_name: skynet-web
    depends_on:
      matrixone:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL_DOCKER:-mysql://root:111@matrixone:6001/skynet}"
      SANDBOX_URL: "${SANDBOX_URL_DOCKER:-http://sandbox:8080}"
      NODE_ENV: "production"
      PORT: "3000"

volumes:
  mo_data:
